  <rect width="32" height="32" rx="16" fill="#fef48a"/>
  <!-- Hand-drawn circle guide -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"
    stroke-dasharray="1 0"
    pathLength="100"/>
  <g transform="rotate(-25 16 16)">
    <!-- Eyes -->
    <circle cx="13" cy="14.5" r="1.2" fill="#1a1a1a"/>
    <circle cx="19" cy="14.5" r="1.2" fill="#1a1a1a"/>
    <!-- Smile -->
    <path d="M12.5 18.5 Q16 21.5 19.5 18.5" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
