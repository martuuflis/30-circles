<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TOTAL = 30;
const TOTAL_SECS = 180;
const CARD_COLORS = ['#fef48a', '#ffc1d8', '#c8f0d0', '#b8e0ff', '#ffd4a8'];

const DOT_BG = {
  background: '#fffaf0',
  backgroundImage: 'radial-gradient(circle, rgba(0,0,0,0.14) 1px, transparent 1px)',
  backgroundSize: '16px 16px',
};

function fmt(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function haptic(ms = [40]) {
  try { navigator.vibrate?.(ms); } catch (_) {}
}

function wobblyPath(size, seed) {
  const r = size / 2 - 3, cx = size / 2, cy = size / 2, steps = 32;
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const j = Math.sin(seed * 3.7 + i * 1.9) * 2.2;
    const x = cx + Math.cos(a) * (r + j);
    const y = cy + Math.sin(a) * (r + j);
    d += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(2)} ${y.toFixed(2)} `;
  }
  return d + 'Z';
}

// ─── Decorative circle with illustration ──────────────────────────────────────

function DecorCircle({ color, size, seed, kind, style }) {
  const pad = 32;
  const tot = size + pad * 2;
  const cx = tot / 2, cy = tot / 2;
  const r = size / 2 - 2;
  const sw = 2.4;

  function outline() {
    const steps = 60;
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      const j = Math.sin(seed * 3.7 + i * 1.9) * 0.5;
      const x = cx + Math.cos(a) * (r + j);
      const y = cy + Math.sin(a) * (r + j);
      d += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(2)} ${y.toFixed(2)} `;
    }
    return d + 'Z';
  }
  const op = outline();

  const blob = <circle cx={cx} cy={cy} r={r + 16} fill={color}/>;
  let inner;
  if (kind === 'face') {
    inner = <>
      {blob}
      <path d={op} fill={color}/>
      <circle cx={cx - r*0.36} cy={cy - r*0.16} r={r*0.09} fill="#1a1a1a"/>
      <circle cx={cx + r*0.36} cy={cy - r*0.16} r={r*0.09} fill="#1a1a1a"/>
      <path d={`M ${cx-r*0.42} ${cy+r*0.2} Q ${cx} ${cy+r*0.56} ${cx+r*0.42} ${cy+r*0.2}`}
        stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  } else if (kind === 'planet') {
    const rx = r * 1.65, ry = r * 0.32, rot = -20;
    inner = <>
      <defs>
        <clipPath id={`pb${seed}`}><rect x={0} y={0} width={tot} height={cy}/></clipPath>
        <clipPath id={`pf${seed}`}><rect x={0} y={cy} width={tot} height={tot}/></clipPath>
      </defs>
      {blob}
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} stroke="#1a1a1a" strokeWidth={sw} fill="none"
        clipPath={`url(#pb${seed})`} transform={`rotate(${rot} ${cx} ${cy})`}/>
      <path d={op} fill={color}/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} stroke="#1a1a1a" strokeWidth={sw} fill="none"
        clipPath={`url(#pf${seed})`} transform={`rotate(${rot} ${cx} ${cy})`}/>
    </>;
  } else if (kind === 'clock') {
    inner = <>
      {blob}
      <path d={op} fill={color}/>
      <line x1={cx} y1={cy} x2={cx} y2={cy - r*0.58} stroke="#1a1a1a" strokeWidth={sw} strokeLinecap="round"/>
      <line x1={cx} y1={cy} x2={cx + r*0.46} y2={cy + r*0.12} stroke="#1a1a1a" strokeWidth={sw - 0.5} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={r*0.07} fill="#1a1a1a"/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  } else if (kind === 'sun') {
    inner = <>
      {blob}
      {Array.from({ length: 8 }, (_, i) => {
        const a = (i / 8) * Math.PI * 2;
        return <line key={i}
          x1={cx + Math.cos(a) * (r + 3)} y1={cy + Math.sin(a) * (r + 3)}
          x2={cx + Math.cos(a) * (r + pad * 0.78)} y2={cy + Math.sin(a) * (r + pad * 0.78)}
          stroke="#1a1a1a" strokeWidth={sw - 0.5} strokeLinecap="round"/>;
      })}
      <path d={op} fill={color}/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  }

  return (
    <div style={{ position: 'absolute', width: size, height: size, ...style }}>
      <svg width={tot} height={tot} style={{ position: 'absolute', top: -pad, left: -pad, overflow: 'visible' }}>
        {inner}
      </svg>
    </div>
  );
}

// ─── Drawing Canvas ───────────────────────────────────────────────────────────

function DrawingCanvas({ tool, undoRef, redoRef, captureRef, circleSeed, onHistoryChangeRef }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);
  const hist = useRef([]);
  const histIdx = useRef(-1);
  const toolRef = useRef(tool);
  const seedRef = useRef(circleSeed);

  useEffect(() => { toolRef.current = tool; }, [tool]);
  useEffect(() => { seedRef.current = circleSeed; }, [circleSeed]);

  const notifyHistory = () => {
    onHistoryChangeRef?.current?.(histIdx.current > 0, histIdx.current < hist.current.length - 1);
  };

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const dims = { W: 0, H: 0 };

    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      if (!W || !H || (Math.abs(W - dims.W) < 0.5 && Math.abs(H - dims.H) < 0.5)) return;
      const saved = (dims.W > 0) ? canvas.toDataURL() : null;
      dims.W = W; dims.H = H;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      const ctx = canvas.getContext('2d');
      ctx.scale(canvas.width / W, canvas.height / H);
      const snap = () => {
        hist.current = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
        histIdx.current = 0;
        notifyHistory();
      };
      if (saved) {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, W, H); snap(); };
        img.src = saved;
      } else { snap(); }
    };

    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    undoRef.current = () => {
      if (histIdx.current <= 0) return;
      histIdx.current--;
      canvas.getContext('2d').putImageData(hist.current[histIdx.current], 0, 0);
      notifyHistory();
    };
    redoRef.current = () => {
      if (histIdx.current >= hist.current.length - 1) return;
      histIdx.current++;
      canvas.getContext('2d').putImageData(hist.current[histIdx.current], 0, 0);
      notifyHistory();
    };
    captureRef.current = () => {
      const { W, H } = dims;
      const off = document.createElement('canvas');
      off.width = canvas.width; off.height = canvas.height;
      const octx = off.getContext('2d');
      octx.scale(dpr, dpr);
      octx.strokeStyle = '#1F1F1F';
      octx.lineWidth = 5;
      octx.beginPath();
      octx.arc(W / 2, H / 2, 107, 0, Math.PI * 2);
      octx.stroke();
      octx.drawImage(canvas, 0, 0, W, H);
      return off.toDataURL('image/png', 0.7);
    };

    return () => ro.disconnect();
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  const saveSnap = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    hist.current = hist.current.slice(0, histIdx.current + 1);
    hist.current.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    histIdx.current = hist.current.length - 1;
    notifyHistory();
  };

  const onPointerDown = (e) => {
    drawing.current = true;
    e.currentTarget.setPointerCapture(e.pointerId);
    const pos = getPos(e);
    lastPos.current = pos;
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (toolRef.current === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = 28;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = '#1F1F1F';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
  };

  const onPointerMove = (e) => {
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const events = e.getCoalescedEvents?.() ?? [e];
    for (const evt of events) {
      const pos = getPos(evt);
      const last = lastPos.current;
      const mx = (last.x + pos.x) / 2;
      const my = (last.y + pos.y) / 2;
      ctx.quadraticCurveTo(last.x, last.y, mx, my);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx, my);
      lastPos.current = pos;
    }
  };

  const onPointerUp = () => {
    if (!drawing.current) return;
    drawing.current = false;
    saveSnap();
  };

  return (
    <canvas
      ref={canvasRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
      style={{
        position: 'absolute', inset: 0,
        width: '100%', height: '100%',
        display: 'block', touchAction: 'none',
        cursor: tool === 'eraser' ? 'cell' : 'crosshair',
        zIndex: 2,
      }}
    />
  );
}

// ─── Intro ────────────────────────────────────────────────────────────────────

function IntroScreen({ onStart }) {
  const decorCircles = [
    { color: '#c8f0d0', size: 90, seed: 3,  top: 'calc(8% - 40px)',    right: '12%', rotate: '8deg',  kind: 'face'   },
    { color: '#b8e0ff', size: 76, seed: 6,  bottom: 'calc(20% - 80px)', left: '8%',  rotate: '-5deg', kind: 'planet' },
    { color: '#ffc1d8', size: 70, seed: 9,  bottom: 'calc(30% - 80px)', right: '7%', rotate: '3deg',  kind: 'clock'  },
    { color: '#ffd4a8', size: 60, seed: 12, top: 'calc(26% - 40px)',   left: '5%',   rotate: '-9deg', kind: 'sun'    },
  ];
  return (
    <div style={{
      width: '100vw', height: '100dvh', ...DOT_BG,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative', overflow: 'hidden',
    }}>
      {decorCircles.map((c, i) => (
        <DecorCircle key={i} {...c} style={{
          top: c.top, right: c.right, bottom: c.bottom, left: c.left,
          transform: `rotate(${c.rotate})`, opacity: 0.88,
        }}/>
      ))}

      <div style={{
        background: '#fef48a', padding: '32px 36px',
        transform: 'rotate(-2deg)',
        boxShadow: '0 8px 32px rgba(0,0,0,0.14)',
        maxWidth: 340, width: '90%',
        position: 'relative', zIndex: 10,
      }}>
        <div style={{ fontFamily: 'Caveat', fontSize: 46, color: '#2a2416', lineHeight: 1.05, fontWeight: 700 }}>
          ready to spark<br/>your creativity?
        </div>
        <div style={{ marginTop: 8, fontFamily: 'Caveat', fontSize: 20, color: '#6a5a2a', lineHeight: 1.4 }}>
          take on the 30 circles challenge!<br/>turn as many blank circles as possible into recognizable objects in 3 minutes
        </div>
        <button
          onClick={() => { haptic([30]); onStart(); }}
          style={{
            marginTop: 32, width: '100%',
            background: '#1a1a1a', color: '#fef48a',
            border: 'none', cursor: 'pointer',
            padding: '14px 0', borderRadius: 999,
            fontSize: 26, fontWeight: 700,
            boxShadow: '0 6px 20px rgba(0,0,0,0.18)',
            transition: 'transform 0.1s, box-shadow 0.1s',
          }}
          onPointerDown={e => { e.currentTarget.style.transform = 'scale(0.97)'; e.currentTarget.style.boxShadow = '0 3px 10px rgba(0,0,0,0.15)'; }}
          onPointerUp={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(0,0,0,0.18)'; }}
        >
          let's start!
        </button>
      </div>
    </div>
  );
}

function ArrowBtn({ label, onClick, disabled, side }) {
  const [pressed, setPressed] = useState(false);
  const br = side === 'left' ? '999px 0 0 999px' : '0 999px 999px 0';
  return (
    <button
      onClick={disabled ? undefined : onClick}
      onPointerDown={disabled ? undefined : () => setPressed(true)}
      onPointerUp={disabled ? undefined : () => setPressed(false)}
      onPointerLeave={() => setPressed(false)}
      style={{
        background: pressed ? '#1a1a1a' : 'transparent',
        border: 'none', borderRadius: br,
        cursor: disabled ? 'default' : 'pointer',
        padding: '14px 20px', lineHeight: 1,
        fontFamily: 'Caveat', fontSize: 24,
        color: pressed ? '#fef48a' : '#1a1a1a',
        opacity: disabled ? 0.25 : 1,
        transition: 'background 0.08s, color 0.08s, opacity 0.15s',
      }}
    >{label}</button>
  );
}

// ─── Drawing Screen ───────────────────────────────────────────────────────────

function DrawingScreen({ circleIdx, timeLeft, tool, setTool, onDone, canvasKey, undoRef, redoRef, captureRef }) {
  const pct = timeLeft / TOTAL_SECS;
  const R = 9;
  const circ = 2 * Math.PI * R;
  const dash = (pct * circ).toFixed(2);

  const [canUndo, setCanUndo] = useState(false);
  const [canRedo, setCanRedo] = useState(false);
  const onHistoryChangeRef = useRef(null);
  onHistoryChangeRef.current = (u, r) => { setCanUndo(u); setCanRedo(r); };

  useEffect(() => { setCanUndo(false); setCanRedo(false); }, [canvasKey]);

  const [isPushing, setIsPushing] = useState(false);

  const handleNext = () => {
    if (isPushing) return;
    setIsPushing(true);
    setTimeout(() => {
      onDone();
      setIsPushing(false);
    }, 400);
  };

  return (
    <div style={{ width: '100vw', height: '100dvh', ...DOT_BG, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

      {/* Top bar */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 14px 0', flexShrink: 0, position: 'relative' }}>
        {/* Timer pill */}
        <div style={{
          background: '#fff', borderRadius: 14,
          padding: '0 14px 2px',
          boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
          display: 'flex', alignItems: 'center', gap: 10,
          height: 60,
        }}>
          <svg width={40} height={40} viewBox="0 0 22 22">
            <circle cx="11" cy="11" r={R} fill="none" stroke="#eee" strokeWidth="2.2"/>
            <circle cx="11" cy="11" r={R} fill="none" stroke="#ff6b6b" strokeWidth="2.2"
              strokeDasharray={`${dash} ${circ.toFixed(2)}`}
              transform="rotate(-90 11 11)" strokeLinecap="round"
              style={{ transition: 'stroke-dasharray 0.9s linear' }}
            />
          </svg>
          <div style={{ textAlign: 'left', width: 40 }}>
            <div style={{ fontFamily: 'Caveat', fontSize: 24, color: '#1a1a1a', lineHeight: 1 }}>{fmt(timeLeft)}</div>
            <div style={{ fontSize: 16, lineHeight: '16px', color: '#888', fontFamily: 'Caveat', letterSpacing: 0.4 }}>left</div>
          </div>
        </div>


        {/* Count pill */}
        <div style={{
          background: '#fff', borderRadius: 14,
          padding: '0 16px 2px',
          boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
          textAlign: 'left',
          height: 60,
          display: 'flex', flexDirection: 'column', alignItems: 'flex-start', justifyContent: 'center',
        }}>
          <div style={{ fontFamily: 'Caveat', fontSize: 24, color: '#1a1a1a', lineHeight: 1 }}>
            {String(circleIdx).padStart(2, '0')}/30
          </div>
          <div style={{ fontSize: 16, lineHeight: '16px', color: '#888', fontFamily: 'Caveat', letterSpacing: 0.4 }}>circles</div>
        </div>
      </div>

      {/* Drawing card — clipping wrapper */}
      <div style={{
        flex: 1, margin: '14px 14px 0', minHeight: 0,
        borderRadius: 14, overflow: 'hidden', position: 'relative',
        boxShadow: '0 4px 20px rgba(0,0,0,0.1)',
      }} className="drawing-card">
        {/* Current card — slides out left */}
        <div style={{
          position: 'absolute', inset: 0,
          background: CARD_COLORS[(circleIdx - 1) % CARD_COLORS.length], borderRadius: 14, overflow: 'hidden',
          animation: isPushing ? 'slideOutLeft 0.4s ease-in-out forwards' : 'none',
        }}>
          <div style={{ position: 'absolute', top: 10, left: 14, zIndex: 5, fontFamily: 'Caveat', fontSize: 22, color: '#6a5a2a', pointerEvents: 'none', userSelect: 'none' }}>
            #{String(circleIdx).padStart(2, '0')}
          </div>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', zIndex: 1 }}>
            <svg width={220} height={220}>
              <circle cx={110} cy={110} r={107} stroke="#1F1F1F" strokeWidth={3} fill="none" opacity={1}/>
            </svg>
          </div>
          <DrawingCanvas
            key={canvasKey}
            tool={tool}
            undoRef={undoRef}
            redoRef={redoRef}
            captureRef={captureRef}
            circleSeed={circleIdx}
            onHistoryChangeRef={onHistoryChangeRef}
          />
        </div>

        {/* Next card placeholder — slides in from right simultaneously */}
        {isPushing && (
          <div style={{
            position: 'absolute', inset: 0,
            background: CARD_COLORS[circleIdx % CARD_COLORS.length], borderRadius: 14, overflow: 'hidden',
            animation: 'slideInRight 0.4s ease-in-out forwards',
          }}>
            <div style={{ position: 'absolute', top: 10, left: 14, zIndex: 5, fontFamily: 'Caveat', fontSize: 22, color: '#6a5a2a', pointerEvents: 'none', userSelect: 'none' }}>
              #{String(circleIdx + 1).padStart(2, '0')}
            </div>
            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none', zIndex: 1 }}>
              <svg width={220} height={220}>
                <circle cx={110} cy={110} r={107} stroke="#1F1F1F" strokeWidth={3} fill="none" opacity={1}/>
              </svg>
            </div>
          </div>
        )}
      </div>

      {/* Bottom bar — fixed to bottom */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px', paddingBottom: 'max(14px, calc(14px + env(safe-area-inset-bottom)))', flexShrink: 0 }}>
        {/* Undo / redo pill */}
        <div style={{
          background: '#fff', borderRadius: 999,
          padding: 0, overflow: 'hidden',
          boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
          display: 'flex', alignItems: 'stretch', gap: 0,
        }}>
          <ArrowBtn label={<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4.75 2C5.1297 2 5.44349 2.28215 5.49315 2.64823L5.5 2.75V8.44L10.0743 3.88014C12.5163 1.43819 16.4385 1.37863 18.9526 3.70146L19.1385 3.88014C21.6415 6.38313 21.6415 10.4413 19.1385 12.9443L10.2933 21.7835C10.0003 22.0762 9.52558 22.0759 9.23269 21.783C8.93979 21.4901 8.94013 21.0151 9.23315 20.7223L18.0778 11.8836C19.995 9.96641 19.995 6.85801 18.0778 4.9408C16.2187 3.08169 13.2395 3.02535 11.3118 4.77248L11.1342 4.94156L6.562 9.5L12.25 9.50018C12.6297 9.50018 12.9435 9.78234 12.9932 10.1484L13 10.2502C13 10.6299 12.7178 10.9437 12.3518 10.9933L12.25 11.0002H4.75C4.3703 11.0002 4.05651 10.718 4.00685 10.352L4 10.2502V2.75C4 2.33579 4.33579 2 4.75 2Z" fill="currentColor"/></svg>} onClick={() => undoRef.current?.()} disabled={!canUndo} side="left" />
          <div style={{ width: 1, alignSelf: 'stretch', background: '#e0e0e0' }} />
          <ArrowBtn label={<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19.2501 2C18.8704 2 18.5566 2.28215 18.507 2.64823L18.5001 2.75V8.44L13.9258 3.88014C11.4838 1.43819 7.56165 1.37863 5.0475 3.70146L4.86162 3.88014C2.35863 6.38313 2.35863 10.4413 4.86162 12.9443L13.7068 21.7835C13.9998 22.0762 14.4745 22.0759 14.7674 21.783C15.0603 21.4901 15.06 21.0151 14.767 20.7223L5.92228 11.8836C4.00507 9.96641 4.00507 6.85801 5.92228 4.9408C7.78139 3.08169 10.7606 3.02535 12.6883 4.77248L12.8659 4.94156L17.4381 9.5L11.7501 9.50018C11.3704 9.50018 11.0566 9.78234 11.007 10.1484L11.0001 10.2502C11.0001 10.6299 11.2823 10.9437 11.6483 10.9933L11.7501 11.0002H19.2501C19.6298 11.0002 19.9436 10.718 19.9933 10.352L20.0001 10.2502V2.75C20.0001 2.33579 19.6643 2 19.2501 2Z" fill="currentColor"/></svg>} onClick={() => redoRef.current?.()} disabled={!canRedo} side="right" />
        </div>

        {/* Next button */}
        <button
          onClick={handleNext}
          style={{
            background: '#1a1a1a', color: '#fef48a',
            border: 'none', cursor: 'pointer',
            padding: '12px 28px', borderRadius: 999,
            fontSize: 24, fontWeight: 700,
            boxShadow: '0 6px 20px rgba(0,0,0,0.2)',
            transition: 'transform 0.1s, box-shadow 0.1s',
          }}
          onPointerDown={e => { e.currentTarget.style.transform = 'scale(0.96)'; e.currentTarget.style.boxShadow = '0 3px 10px rgba(0,0,0,0.15)'; }}
          onPointerUp={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(0,0,0,0.2)'; }}
          onPointerLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(0,0,0,0.2)'; }}
        >
          {circleIdx >= TOTAL ? 'finish ✓' : 'next →'}
        </button>
      </div>
    </div>
  );
}

// ─── End Screen ───────────────────────────────────────────────────────────────

function EndScreen({ count, timeLeft, drawings, onRestart }) {
  const colors = CARD_COLORS;
  const elapsed = TOTAL_SECS - timeLeft;
  const cols = Math.min(count, 5);

  const handleDownload = async () => {
    haptic([50]);

    const cols = 5;
    const rows = Math.ceil(count / cols);
    const cellSize = 72;
    const gap = 8;
    const cardPad = 28;
    const gridW = cols * cellSize + (cols - 1) * gap;
    const gridH = rows * cellSize + (rows - 1) * gap;
    const cardW = gridW + cardPad * 2;
    const headerH = 83;
    const cardH = cardPad + headerH + gridH + cardPad;
    const margin = 60;
    const canvasW = cardW + margin * 2;
    const canvasH = cardH + margin * 2;

    const dpr = 2;
    const off = document.createElement('canvas');
    off.width = canvasW * dpr;
    off.height = canvasH * dpr;
    const ctx = off.getContext('2d');
    ctx.scale(dpr, dpr);

    // Dot background
    ctx.fillStyle = '#fffaf0';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    for (let x = 8; x < canvasW; x += 16) {
      for (let y = 8; y < canvasH; y += 16) {
        ctx.beginPath();
        ctx.arc(x, y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const cardX = margin;
    const cardY = margin;

    // Rotated card
    ctx.save();
    ctx.translate(cardX + cardW / 2, cardY + cardH / 2);
    ctx.rotate(-Math.PI / 180);
    ctx.translate(-(cardX + cardW / 2), -(cardY + cardH / 2));

    // Shadow + white card
    ctx.shadowColor = 'rgba(0,0,0,0.11)';
    ctx.shadowBlur = 36;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle = '#fff';
    const rr = 16;
    ctx.beginPath();
    ctx.moveTo(cardX + rr, cardY);
    ctx.lineTo(cardX + cardW - rr, cardY);
    ctx.quadraticCurveTo(cardX + cardW, cardY, cardX + cardW, cardY + rr);
    ctx.lineTo(cardX + cardW, cardY + cardH - rr);
    ctx.quadraticCurveTo(cardX + cardW, cardY + cardH, cardX + cardW - rr, cardY + cardH);
    ctx.lineTo(cardX + rr, cardY + cardH);
    ctx.quadraticCurveTo(cardX, cardY + cardH, cardX, cardY + cardH - rr);
    ctx.lineTo(cardX, cardY + rr);
    ctx.quadraticCurveTo(cardX, cardY, cardX + rr, cardY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Title
    await document.fonts.load('700 36px Caveat');
    ctx.font = '700 36px Caveat, cursive';
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText('creativity sparkled ✨', cardX + cardPad, cardY + cardPad + 36);

    // Subtitle
    ctx.font = '15px system-ui, sans-serif';
    ctx.fillStyle = '#666';
    const subtitleText = count < 30
      ? `you drew ${count} ${count === 1 ? 'circle' : 'circles'} in 3 minutes, well done!`
      : `you drew ${count} circles in 3 minutes, challenge completed!`;
    ctx.fillText(subtitleText, cardX + cardPad, cardY + cardPad + 62);

    // Preload drawing images
    const imgEls = await Promise.all(
      Array.from({ length: count }, (_, i) =>
        drawings[i]
          ? new Promise(res => { const img = new Image(); img.onload = () => res(img); img.src = drawings[i]; })
          : Promise.resolve(null)
      )
    );

    const gridTop = cardY + cardPad + headerH;
    const imgR = cellSize * 0.9;
    const blobColors = ['#fef48a', '#ffc1d8', '#c8f0d0', '#b8e0ff', '#ffd4a8'];

    for (let i = 0; i < count; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = cardX + cardPad + col * (cellSize + gap) + cellSize / 2;
      const cy = gridTop + row * (cellSize + gap) + cellSize / 2;

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = blobColors[i % blobColors.length];
      ctx.beginPath();
      ctx.arc(cx, cy, cellSize / 2, 0, Math.PI * 2);
      ctx.fill();

      if (imgEls[i]) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, imgR, 0, Math.PI * 2);
        ctx.clip();
        ctx.globalCompositeOperation = 'multiply';
        const iw = imgEls[i].naturalWidth, ih = imgEls[i].naturalHeight;
        const scale = Math.max((imgR * 2) / iw, (imgR * 2) / ih);
        const sw = (imgR * 2) / scale, sh = (imgR * 2) / scale;
        const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
        ctx.drawImage(imgEls[i], sx, sy, sw, sh, cx - imgR, cy - imgR, imgR * 2, imgR * 2);
        ctx.restore();
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = '#1F1F1F';
        ctx.lineWidth = 7 * (cellSize / 42);
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.45, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.restore();

    const a = document.createElement('a');
    a.download = '30-circles.png';
    a.href = off.toDataURL('image/png');
    a.click();
  };

  return (
    <div style={{
      width: '100%', height: '100dvh', ...DOT_BG,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '80px 24px 100px', overflow: 'hidden',
    }} className="end-outer">
      {[['#ff6b6b', '5vw', '5vh'], ['#3a9eea', '88vw', '8vh'], ['#f0b840', '6vw', '88vh'], ['#70c27b', '86vw', '84vh']].map(([c, l, t], i) => (
        <div key={i} style={{ position: 'fixed', left: l, top: t, width: 12, height: 12, borderRadius: 12, background: c, opacity: 0.8 }}/>
      ))}

      <div style={{
        maxWidth: 500, width: '90%',
        maxHeight: '90vh', overflowY: 'auto', scrollbarWidth: 'none',
        background: '#fff', borderRadius: 16,
        boxShadow: '0 8px 36px rgba(0,0,0,0.11)',
        padding: '28px 28px 24px',
        transform: 'rotate(-1deg)',
      }} className="end-card">
        <div style={{ fontFamily: 'Caveat', fontSize: 36, color: '#1a1a1a', lineHeight: 1, marginBottom: 6 }}>
          creativity <span style={{whiteSpace: 'nowrap'}}>sparkled ✨</span>
        </div>
        <div style={{ fontSize: 18, color: '#666', fontFamily: 'Caveat', lineHeight: 1.5 }}>
          {count < 30
            ? `you drew ${count} ${count === 1 ? 'circle' : 'circles'} in 3 minutes, well done!`
            : `you drew ${count} circles in 3 minutes, challenge completed!`}
        </div>

        <div style={{ marginTop: 18, display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
          {Array.from({ length: count }).map((_, i) => (
            <div key={i} style={{ aspectRatio: '1', position: 'relative' }}>
              {/* colored blob — 126% of cell, centered */}
              <div style={{
                position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                width: '100%', height: '100%',
                background: colors[i % colors.length],
                borderRadius: '50%',
              }}/>
              {/* drawing circle — centered on blob, slightly smaller */}
              <div style={{
                position: 'absolute',
                top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                width: '180%', height: '180%',
                borderRadius: '50%', overflow: 'hidden',
              }}>
                {drawings[i]
                  ? <img src={drawings[i]} style={{ width: '100%', height: '100%', objectFit: 'cover', mixBlendMode: 'multiply' }} alt={`circle ${i + 1}`}/>
                  : <svg width="100%" height="100%" viewBox="0 0 42 42" style={{ position: 'absolute', inset: 0 }}>
                      <circle cx={21} cy={21} r={19} stroke="#1F1F1F" strokeWidth={7} fill="none"/>
                    </svg>
                }
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{
        position: 'fixed', bottom: 'max(20px, calc(20px + env(safe-area-inset-bottom)))', left: 0, right: 0,
        display: 'flex', gap: 12, padding: '0 20px', justifyContent: 'center',
        zIndex: 10,
      }}>
        {[
          { label: 'do it again',  onClick: onRestart,        bg: '#fff',    color: '#1a1a1a', border: '2px solid #1a1a1a' },
          { label: <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>download <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18.2498 20.5009C18.664 20.5008 19 20.8365 19 21.2507C19 21.6649 18.6644 22.0008 18.2502 22.0009L5.25022 22.0047C4.836 22.0048 4.5 21.6691 4.5 21.2549C4.5 20.8407 4.83557 20.5048 5.24978 20.5047L18.2498 20.5009ZM11.6482 2.01271L11.75 2.00586C12.1297 2.00586 12.4435 2.28801 12.4932 2.65409L12.5 2.75586L12.499 16.4409L16.2208 12.7205C16.4871 12.4543 16.9038 12.4301 17.1974 12.648L17.2815 12.7206C17.5477 12.9869 17.5719 13.4036 17.354 13.6972L17.2814 13.7813L12.2837 18.7779C12.0176 19.044 11.6012 19.0683 11.3076 18.8507L11.2235 18.7782L6.22003 13.7816C5.92694 13.4889 5.92661 13.014 6.21931 12.7209C6.48539 12.4545 6.90204 12.43 7.1958 12.6477L7.27997 12.7202L10.999 16.4339L11 2.75586C11 2.37616 11.2822 2.06237 11.6482 2.01271Z" fill="currentColor"/></svg></span>, onClick: handleDownload, bg: '#1a1a1a', color: '#fef48a', border: 'none' },
        ].map(({ label, onClick, bg, color, border }) => (
          <button key={label} onClick={onClick} style={{
            width: 160, background: bg, color, border,
            cursor: 'pointer', padding: '14px 0', borderRadius: 999,
            fontFamily: 'Caveat', fontSize: 22, fontWeight: 700,
            boxShadow: '0 4px 14px rgba(0,0,0,0.1)',
            transition: 'transform 0.1s',
          }}
            onPointerDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
            onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
          >{label}</button>
        ))}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('intro');
  const [circleIdx, setCircleIdx] = useState(1);
  const [timeLeft, setTimeLeft] = useState(TOTAL_SECS);
  const [running, setRunning] = useState(false);
  const [tool, setTool] = useState('pen');
  const [canvasKey, setCanvasKey] = useState(0);
  const [drawings, setDrawings] = useState([]);
  const undoRef = useRef(null);
  const redoRef = useRef(null);
  const captureRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    if (timeLeft <= 0) {
      setRunning(false);
      const dataUrl = captureRef.current?.();
      if (dataUrl) setDrawings(d => [...d, dataUrl]);
      haptic([100, 50, 100, 50, 200]);
      setScreen('done');
      return;
    }
    const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(id);
  }, [running, timeLeft]);

  const handleStart = () => {
    setScreen('drawing');
    setRunning(true);
  };

  const handleDone = () => {
    haptic([40]);
    const dataUrl = captureRef.current?.();
    setDrawings(d => dataUrl ? [...d, dataUrl] : d);
    if (circleIdx >= TOTAL) {
      setRunning(false);
      setScreen('done');
      return;
    }
    setCircleIdx(i => i + 1);
    setCanvasKey(k => k + 1);
    setTool('pen');
  };

  const handleRestart = () => {
    setScreen('intro');
    setCircleIdx(1);
    setTimeLeft(TOTAL_SECS);
    setRunning(false);
    setTool('pen');
    setCanvasKey(k => k + 1);
    setDrawings([]);
  };

  if (screen === 'intro') return <IntroScreen onStart={handleStart}/>;
  if (screen === 'drawing') return (
    <DrawingScreen
      circleIdx={circleIdx}
      timeLeft={timeLeft}
      tool={tool}
      setTool={setTool}
      onDone={handleDone}
      canvasKey={canvasKey}
      undoRef={undoRef}
      redoRef={redoRef}
      captureRef={captureRef}
    />
  );
  return (
    <EndScreen
      count={drawings.length}
      timeLeft={timeLeft}
      drawings={drawings}
      onRestart={handleRestart}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
