<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TOTAL = 30;
const TOTAL_SECS = 180;
const CARD_COLORS = ['#fef48a', '#ffc1d8', '#c8f0d0', '#b8e0ff', '#ffd4a8'];

const DOT_BG = {
  background: '#fffaf0',
  backgroundImage: 'radial-gradient(circle, rgba(0,0,0,0.14) 1px, transparent 1px)',
  backgroundSize: '16px 16px',
};

function fmt(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function haptic(ms = [40]) {
  try { navigator.vibrate?.(ms); } catch (_) {}
}

function wobblyPath(size, seed) {
  const r = size / 2 - 3, cx = size / 2, cy = size / 2, steps = 32;
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const j = Math.sin(seed * 3.7 + i * 1.9) * 2.2;
    const x = cx + Math.cos(a) * (r + j);
    const y = cy + Math.sin(a) * (r + j);
    d += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(2)} ${y.toFixed(2)} `;
  }
  return d + 'Z';
}

// ─── Decorative circle with illustration ──────────────────────────────────────

function DecorCircle({ color, size, seed, kind, style }) {
  const pad = 32;
  const tot = size + pad * 2;
  const cx = tot / 2, cy = tot / 2;
  const r = size / 2 - 2;
  const sw = 2.4;

  function outline() {
    const steps = 60;
    let d = '';
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      const j = Math.sin(seed * 3.7 + i * 1.9) * 0.5;
      const x = cx + Math.cos(a) * (r + j);
      const y = cy + Math.sin(a) * (r + j);
      d += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(2)} ${y.toFixed(2)} `;
    }
    return d + 'Z';
  }
  const op = outline();

  const blob = <circle cx={cx} cy={cy} r={r + 16} fill={color}/>;
  let inner;
  if (kind === 'face') {
    inner = <>
      {blob}
      <path d={op} fill={color}/>
      <circle cx={cx - r*0.36} cy={cy - r*0.16} r={r*0.09} fill="#1a1a1a"/>
      <circle cx={cx + r*0.36} cy={cy - r*0.16} r={r*0.09} fill="#1a1a1a"/>
      <path d={`M ${cx-r*0.42} ${cy+r*0.2} Q ${cx} ${cy+r*0.56} ${cx+r*0.42} ${cy+r*0.2}`}
        stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  } else if (kind === 'planet') {
    const rx = r * 1.65, ry = r * 0.32, rot = -20;
    inner = <>
      <defs>
        <clipPath id={`pb${seed}`}><rect x={0} y={0} width={tot} height={cy}/></clipPath>
        <clipPath id={`pf${seed}`}><rect x={0} y={cy} width={tot} height={tot}/></clipPath>
      </defs>
      {blob}
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} stroke="#1a1a1a" strokeWidth={sw} fill="none"
        clipPath={`url(#pb${seed})`} transform={`rotate(${rot} ${cx} ${cy})`}/>
      <path d={op} fill={color}/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} stroke="#1a1a1a" strokeWidth={sw} fill="none"
        clipPath={`url(#pf${seed})`} transform={`rotate(${rot} ${cx} ${cy})`}/>
    </>;
  } else if (kind === 'clock') {
    inner = <>
      {blob}
      <path d={op} fill={color}/>
      <line x1={cx} y1={cy} x2={cx} y2={cy - r*0.58} stroke="#1a1a1a" strokeWidth={sw} strokeLinecap="round"/>
      <line x1={cx} y1={cy} x2={cx + r*0.46} y2={cy + r*0.12} stroke="#1a1a1a" strokeWidth={sw - 0.5} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={r*0.07} fill="#1a1a1a"/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  } else if (kind === 'sun') {
    inner = <>
      {blob}
      {Array.from({ length: 8 }, (_, i) => {
        const a = (i / 8) * Math.PI * 2;
        return <line key={i}
          x1={cx + Math.cos(a) * (r + 3)} y1={cy + Math.sin(a) * (r + 3)}
          x2={cx + Math.cos(a) * (r + pad * 0.78)} y2={cy + Math.sin(a) * (r + pad * 0.78)}
          stroke="#1a1a1a" strokeWidth={sw - 0.5} strokeLinecap="round"/>;
      })}
      <path d={op} fill={color}/>
      <path d={op} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinejoin="round"/>
    </>;
  }

  return (
    <div style={{ position: 'absolute', width: size, height: size, ...style }}>
      <svg width={tot} height={tot} style={{ position: 'absolute', top: -pad, left: -pad, overflow: 'visible' }}>
        {inner}
      </svg>
    </div>
  );
}

// ─── Drawing Canvas ───────────────────────────────────────────────────────────

function DrawingCanvas({ tool, undoRef, redoRef, captureRef, circleSeed, onHistoryChangeRef }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);
  const startPos = useRef(null);
  const hist = useRef([]);
  const histIdx = useRef(-1);
  const toolRef = useRef(tool);
  const seedRef = useRef(circleSeed);

  useEffect(() => { toolRef.current = tool; }, [tool]);
  useEffect(() => { seedRef.current = circleSeed; }, [circleSeed]);

  const notifyHistory = () => {
    onHistoryChangeRef?.current?.(histIdx.current > 0, histIdx.current < hist.current.length - 1);
  };

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const dims = { W: 0, H: 0 };

    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      if (!W || !H || (Math.abs(W - dims.W) < 0.5 && Math.abs(H - dims.H) < 0.5)) return;
      const saved = (dims.W > 0) ? canvas.toDataURL() : null;
      dims.W = W; dims.H = H;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      const ctx = canvas.getContext('2d');
      ctx.scale(canvas.width / W, canvas.height / H);
      const snap = () => {
        hist.current = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
        histIdx.current = 0;
        notifyHistory();
      };
      if (saved) {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, W, H); snap(); };
        img.src = saved;
      } else { snap(); }
    };

    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    undoRef.current = () => {
      if (histIdx.current <= 0) return;
      histIdx.current--;
      canvas.getContext('2d').putImageData(hist.current[histIdx.current], 0, 0);
      notifyHistory();
    };
    redoRef.current = () => {
      if (histIdx.current >= hist.current.length - 1) return;
      histIdx.current++;
      canvas.getContext('2d').putImageData(hist.current[histIdx.current], 0, 0);
      notifyHistory();
    };
    captureRef.current = () => {
      const { W, H } = dims;
      const off = document.createElement('canvas');
      off.width = canvas.width; off.height = canvas.height;
      const octx = off.getContext('2d');
      octx.scale(dpr, dpr);
      octx.strokeStyle = '#1F1F1F';
      octx.lineWidth = 5;
      octx.beginPath();
      octx.arc(W / 2, H / 2, 107, 0, Math.PI * 2);
      octx.stroke();
      octx.drawImage(canvas, 0, 0, W, H);
      return off.toDataURL('image/png', 0.7);
    };

    return () => ro.disconnect();
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  const saveSnap = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    hist.current = hist.current.slice(0, histIdx.current + 1);
    hist.current.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    histIdx.current = hist.current.length - 1;
    notifyHistory();
  };

  const onPointerDown = (e) => {
    drawing.current = true;
    e.currentTarget.setPointerCapture(e.pointerId);
    const pos = getPos(e);
    lastPos.current = pos;
    startPos.current = pos;
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (toolRef.current === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = 28;
      ctx.fillStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = '#1F1F1F';
      ctx.fillStyle = '#1F1F1F';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
  };

  const onPointerMove = (e) => {
    if (!drawing.current) return;
    const ctx = canvasRef.current.getContext('2d');
    const events = e.getCoalescedEvents?.() ?? [e];
    for (const evt of events) {
      const pos = getPos(evt);
      const last = lastPos.current;
      const mx = (last.x + pos.x) / 2;
      const my = (last.y + pos.y) / 2;
      ctx.quadraticCurveTo(last.x, last.y, mx, my);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx, my);
      lastPos.current = pos;
    }
  };

  const onPointerUp = () => {
    if (!drawing.current) return;
    drawing.current = false;
    const dp = lastPos.current;
    const sp = startPos.current;
    const dist = Math.hypot(dp.x - sp.x, dp.y - sp.y);
    if (dist < 4) {
      const ctx = canvasRef.current.getContext('2d');
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    saveSnap();
  };

  return (
    <canvas
      ref={canvasRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
      style={{
        position: 'absolute', inset: 0,
        width: '100%', height: '100%',
        display: 'block', touchAction: 'none',
        cursor: tool === 'eraser' ? 'cell' : 'crosshair',
        userSelect: 'none', WebkitUserSelect: 'none', WebkitTouchCallout: 'none',
        zIndex: 2,
      }}
    />
  );
}

        }}

        onMouseLeave={e => { e.currentTarget.style.opacity = '0.75'; e.currentTarget.style.textDecoration = 'none'; }}
      >
        Made by Marta Gracia Ibáñez <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{display:'inline-block',verticalAlign:'middle',marginLeft:3,position:'relative',top:'-1px'}}><path d="M8.75 9.5H13.4905L8.22232 14.7172C7.928 15.0086 7.92569 15.4835 8.21715 15.7778C8.50862 16.0721 8.98349 16.0744 9.2778 15.783L14.5 10.6114V15.25C14.5 15.6642 14.8358 16 15.25 16C15.6642 16 16 15.6642 16 15.25V8.75C16 8.33579 15.6642 8 15.25 8H8.75C8.33579 8 8 8.33579 8 8.75C8 9.16421 8.33579 9.5 8.75 9.5Z" fill="currentColor"/><path d="M6.25 3C4.45507 3 3 4.45507 3 6.25V17.75C3 19.5449 4.45507 21 6.25 21H17.75C19.5449 21 21 19.5449 21 17.75V6.25C21 4.45507 19.5449 3 17.75 3H6.25ZM4.5 6.25C4.5 5.2835 5.2835 4.5 6.25 4.5H17.75C18.7165 4.5 19.5 5.2835 19.5 6.25V17.75C19.5 18.7165 18.7165 19.5 17.75 19.5H6.25C5.2835 19.5 4.5 18.7165 4.5 17.75V6.25Z" fill="currentColor"/></svg>
      </a>

      <div style={{
        background: '#fef48a', padding: '32px 36px',
        transform: 'rotate(-2deg)',
        boxShadow: '0 8px 32px rgba(0,0,0,0.14)',
        maxWidth: 340, width: '90%',
        position: 'relative', zIndex: 10,
        animation: isLeaving ? 'introCardExitLeft 0.45s cubic-bezier(0.4,0,1,0.5) both' : enterFromTop ? 'introCardEnterFromTop 0.55s cubic-bezier(0.34,1.56,0.64,1) both' : 'none',

function ArrowBtn({ label, onClick, disabled, side }) {
  const [pressed, setPressed] = useState(false);
  const br = side === 'left' ? '999px 0 0 999px' : '0 999px 999px 0';
  return (
    <button
      onClick={disabled ? undefined : onClick}
      onPointerDown={disabled ? undefined : () => setPressed(true)}
      onPointerUp={disabled ? undefined : () => setPressed(false)}
      onPointerLeave={() => setPressed(false)}
      style={{
        background: pressed ? '#1a1a1a' : 'transparent',
        border: 'none', borderRadius: br,
        cursor: disabled ? 'default' : 'pointer',
        padding: '14px 20px', lineHeight: 1,
        fontFamily: 'Caveat', fontSize: 24,
        color: pressed ? '#fef48a' : '#1a1a1a',
        opacity: disabled ? 0.25 : 1,
        transition: 'background 0.08s, color 0.08s, opacity 0.15s',
      }}
    >{label}</button>
  );
}

// ─── Drawing Screen ───────────────────────────────────────────────────────────

function DrawingScreen({ circleIdx, timeLeft, tool, setTool, onDone, canvasKey, undoRef, redoRef, captureRef, isLeaving }) {
  const pct = timeLeft / TOTAL_SECS;
  const R = 9;
  const circ = 2 * Math.PI * R;
  const dash = (pct * circ).toFixed(2);

  const [canUndo, setCanUndo] = useState(false);
  const [canRedo, setCanRedo] = useState(false);
  const onHistoryChangeRef = useRef(null);

          <DrawingCanvas

      {/* Bottom bar — fixed to bottom */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px', paddingBottom: 'max(14px, calc(14px + env(safe-area-inset-bottom)))', flexShrink: 0, animation: isLeaving ? 'introCircleExitLeft 0.45s cubic-bezier(0.4,0,1,0.5) 0.12s both' : animIn ? 'drawEnterRight 0.55s cubic-bezier(0.34,1.2,0.64,1) 0.18s both' : 'none' }}>
        {/* Undo / redo pill */}
        <div style={{
          background: '#fff', borderRadius: 999,

          <ArrowBtn label={<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4.75 2C5.1297 2 5.44349 2.28215 5.49315 2.64823L5.5 2.75V8.44L10.0743 3.88014C12.5163 1.43819 16.4385 1.37863 18.9526 3.70146L19.1385 3.88014C21.6415 6.38313 21.6415 10.4413 19.1385 12.9443L10.2933 21.7835C10.0003 22.0762 9.52558 22.0759 9.23269 21.783C8.93979 21.4901 8.94013 21.0151 9.23315 20.7223L18.0778 11.8836C19.995 9.96641 19.995 6.85801 18.0778 4.9408C16.2187 3.08169 13.2395 3.02535 11.3118 4.77248L11.1342 4.94156L6.562 9.5L12.25 9.50018C12.6297 9.50018 12.9435 9.78234 12.9932 10.1484L13 10.2502C13 10.6299 12.7178 10.9437 12.3518 10.9933L12.25 11.0002H4.75C4.3703 11.0002 4.05651 10.718 4.00685 10.352L4 10.2502V2.75C4 2.33579 4.33579 2 4.75 2Z" fill="currentColor"/></svg>} onClick={() => undoRef.current?.()} disabled={!canUndo} side="left" />
          <div style={{ width: 1, alignSelf: 'stretch', background: '#e0e0e0' }} />
          <ArrowBtn label={<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M19.2501 2C18.8704 2 18.5566 2.28215 18.507 2.64823L18.5001 2.75V8.44L13.9258 3.88014C11.4838 1.43819 7.56165 1.37863 5.0475 3.70146L4.86162 3.88014C2.35863 6.38313 2.35863 10.4413 4.86162 12.9443L13.7068 21.7835C13.9998 22.0762 14.4745 22.0759 14.7674 21.783C15.0603 21.4901 15.06 21.0151 14.767 20.7223L5.92228 11.8836C4.00507 9.96641 4.00507 6.85801 5.92228 4.9408C7.78139 3.08169 10.7606 3.02535 12.6883 4.77248L12.8659 4.94156L17.4381 9.5L11.7501 9.50018C11.3704 9.50018 11.0566 9.78234 11.007 10.1484L11.0001 10.2502C11.0001 10.6299 11.2823 10.9437 11.6483 10.9933L11.7501 11.0002H19.2501C19.6298 11.0002 19.9436 10.718 19.9933 10.352L20.0001 10.2502V2.75C20.0001 2.33579 19.6643 2 19.2501 2Z" fill="currentColor"/></svg>} onClick={() => redoRef.current?.()} disabled={!canRedo} side="right" />
        </div>

        {/* Next button */}
        <button
          onClick={handleNext}
          style={{
            background: '#1a1a1a', color: '#fef48a',
            border: 'none', cursor: 'pointer',
            padding: '12px 28px', borderRadius: 999,
            fontSize: 24, fontWeight: 700,

          onPointerUp={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(0,0,0,0.2)'; }}
          onPointerLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(0,0,0,0.2)'; }}
        >
          {circleIdx >= TOTAL ? <span style={{display:'flex',alignItems:'center',gap:8}}><span style={{position:'relative',top:'-2px'}}>Finish</span> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.53033 12.9697C4.23744 12.6768 3.76256 12.6768 3.46967 12.9697C3.17678 13.2626 3.17678 13.7374 3.46967 14.0303L7.96967 18.5303C8.26256 18.8232 8.73744 18.8232 9.03033 18.5303L20.0303 7.53033C20.3232 7.23744 20.3232 6.76256 20.0303 6.46967C19.7374 6.17678 19.2626 6.17678 18.9697 6.46967L8.5 16.9393L4.53033 12.9697Z" fill="currentColor"/></svg></span> : <span style={{display:'flex',alignItems:'center',gap:8}}><span style={{position:'relative',top:'-2px'}}>Next</span> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8.46967 4.21967C8.17678 4.51256 8.17678 4.98744 8.46967 5.28033L15.1893 12L8.46967 18.7197C8.17678 19.0126 8.17678 19.4874 8.46967 19.7803C8.76256 20.0732 9.23744 20.0732 9.53033 19.7803L16.7803 12.5303C17.0732 12.2374 17.0732 11.7626 16.7803 11.4697L9.53033 4.21967C9.23744 3.92678 8.76256 3.92678 8.46967 4.21967Z" fill="currentColor"/></svg></span>}
        </button>

}

// ─── End Screen ───────────────────────────────────────────────────────────────

function EndScreen({ count, timeLeft, drawings, onRestart, isLeaving }) {
  const [animIn, setAnimIn] = useState(true);
  useEffect(() => {
    const id = setTimeout(() => setAnimIn(false), 900);
    return () => clearTimeout(id);
  }, []);

  const colors = CARD_COLORS;
  const elapsed = TOTAL_SECS - timeLeft;
  const cols = Math.min(count, 5);

  const canNativeShare = typeof navigator !== 'undefined' && !!navigator.share;

  const buildShareCanvas = async () => {
    const cols = 5;
    const rows = Math.ceil(count / cols);
    const cellSize = 72;
    const gap = 8;
    const cardPad = 28;
    const gridW = cols * cellSize + (cols - 1) * gap;
    const gridH = rows * cellSize + (rows - 1) * gap;
    const cardW = gridW + cardPad * 2;
    const headerH = 83;
    const cardH = cardPad + headerH + gridH + cardPad;
    const margin = 60;
    const canvasW = cardW + margin * 2;
    const canvasH = cardH + margin * 2;

    const dpr = 2;
    const off = document.createElement('canvas');
    off.width = canvasW * dpr;
    off.height = canvasH * dpr;
    const ctx = off.getContext('2d');
    ctx.scale(dpr, dpr);

    // Dot background
    ctx.fillStyle = '#fffaf0';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    for (let x = 8; x < canvasW; x += 16) {
      for (let y = 8; y < canvasH; y += 16) {
        ctx.beginPath();
        ctx.arc(x, y, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const cardX = margin;
    const cardY = margin;

    // Rotated card
    ctx.save();
    ctx.translate(cardX + cardW / 2, cardY + cardH / 2);
    ctx.rotate(-Math.PI / 180);
    ctx.translate(-(cardX + cardW / 2), -(cardY + cardH / 2));

    // Shadow + white card
    ctx.shadowColor = 'rgba(0,0,0,0.11)';
    ctx.shadowBlur = 36;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle = '#fff';
    const rr = 16;
    ctx.beginPath();
    ctx.moveTo(cardX + rr, cardY);
    ctx.lineTo(cardX + cardW - rr, cardY);
    ctx.quadraticCurveTo(cardX + cardW, cardY, cardX + cardW, cardY + rr);
    ctx.lineTo(cardX + cardW, cardY + cardH - rr);
    ctx.quadraticCurveTo(cardX + cardW, cardY + cardH, cardX + cardW - rr, cardY + cardH);
    ctx.lineTo(cardX + rr, cardY + cardH);
    ctx.quadraticCurveTo(cardX, cardY + cardH, cardX, cardY + cardH - rr);
    ctx.lineTo(cardX, cardY + rr);
    ctx.quadraticCurveTo(cardX, cardY, cardX + rr, cardY);
    ctx.closePath();
    ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Title
    await document.fonts.load('700 36px Caveat');
    ctx.font = '700 36px Caveat, cursive';
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText('creativity sparkled ✨', cardX + cardPad, cardY + cardPad + 36);

    // Subtitle
    await document.fonts.load('400 20px Caveat');
    ctx.font = '400 20px Caveat, cursive';
    ctx.fillStyle = '#666';
    const subtitleText = count < 30
      ? `You turned ${count} ${count === 1 ? 'circle' : 'circles'} into objects in 3 minutes, well done!`
      : `Whoohoo! You turned all 30 circles into objects in 3 minutes.`;
    ctx.fillText(subtitleText, cardX + cardPad, cardY + cardPad + 62);

    // Preload drawing images
    const imgEls = await Promise.all(
      Array.from({ length: count }, (_, i) =>
        drawings[i]
          ? new Promise(res => { const img = new Image(); img.onload = () => res(img); img.src = drawings[i]; })
          : Promise.resolve(null)
      )
    );

    const gridTop = cardY + cardPad + headerH;
    const imgR = cellSize / 2;
    const blobColors = ['#fef48a', '#ffc1d8', '#c8f0d0', '#b8e0ff', '#ffd4a8'];

    for (let i = 0; i < count; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = cardX + cardPad + col * (cellSize + gap) + cellSize / 2;
      const cy = gridTop + row * (cellSize + gap) + cellSize / 2;

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = blobColors[i % blobColors.length];
      ctx.beginPath();
      ctx.arc(cx, cy, cellSize / 2, 0, Math.PI * 2);
      ctx.fill();

      if (imgEls[i]) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, imgR, 0, Math.PI * 2);
        ctx.clip();
        ctx.globalCompositeOperation = 'source-over';
        const iw = imgEls[i].naturalWidth, ih = imgEls[i].naturalHeight;
        const scale = Math.max((imgR * 2) / iw, (imgR * 2) / ih);
        const sw = (imgR * 2) / scale, sh = (imgR * 2) / scale;
        const sx = (iw - sw) / 2, sy = (ih - sh) / 2;
        ctx.drawImage(imgEls[i], sx, sy, sw, sh, cx - imgR, cy - imgR, imgR * 2, imgR * 2);
        ctx.restore();
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = '#1F1F1F';
        ctx.lineWidth = 7 * (cellSize / 42);
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.45, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.restore();
    return off;
  };

  const triggerDownload = (off) => {
    const a = document.createElement('a');
    a.download = '30-circles.png';
    a.href = off.toDataURL('image/png');
    a.click();
  };

  const handleDownload = async () => {
    window.umami?.track('result_downloaded');
    haptic([50]);
    const off = await buildShareCanvas();
    triggerDownload(off);
  };

  const handleShare = async () => {
    window.umami?.track('result_shared');
    haptic([50]);
    const off = await buildShareCanvas();
    const blob = await new Promise(res => off.toBlob(res, 'image/png'));
    const file = new File([blob], '30-circles.png', { type: 'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          text: `I just tried the 30 Circles challenge and turned ${count} circles into objects in 3 minutes. Think you can beat that?`,
          url: 'https://martuuflis.github.io/30-circles/',
        });
      } catch (e) {
        if (e.name !== 'AbortError') triggerDownload(off);
      }
    } else {
      triggerDownload(off);
    }
  };

  return (
    <div style={{
      width: '100%', height: '100dvh', ...DOT_BG,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      paddingTop: 24, paddingLeft: 24, paddingRight: 24,
      paddingBottom: 'calc(max(20px, 20px + env(safe-area-inset-bottom)) + 152px)',
      overflow: 'hidden',
    }} className="end-outer">
      {[['#ff6b6b', '5vw', '5vh'], ['#3a9eea', '88vw', '8vh'], ['#f0b840', '6vw', '88vh'], ['#70c27b', '86vw', '84vh']].map(([c, l, t], i) => (
        <div key={i} style={{ position: 'fixed', left: l, top: t, width: 12, height: 12, borderRadius: 12, background: c, opacity: 0.8 }}/>
      ))}

      <div style={{
        maxWidth: 500, width: '90%',
        maxHeight: '90vh', overflowY: 'auto', scrollbarWidth: 'none',
        background: '#fff', borderRadius: 16,
        boxShadow: '0 8px 36px rgba(0,0,0,0.11)',
        padding: '28px 28px 24px',
        transform: 'rotate(-1deg)',
        animation: isLeaving ? 'endCardExitDown 0.45s cubic-bezier(0.4,0,1,0.5) both' : animIn ? 'endCardEnterRight 0.55s cubic-bezier(0.34,1.56,0.64,1) both' : 'none',
      }} className="end-card">
        <div style={{ fontFamily: 'Caveat', fontSize: 36, color: '#1a1a1a', lineHeight: 1, marginBottom: 6 }}>
          {count === 0
            ? 'No drawings yet!'
            : <>creativity <span style={{whiteSpace: 'nowrap'}}>sparkled ✨</span></>}
        </div>
        <div style={{ fontSize: 18, color: '#666', fontFamily: 'Caveat', lineHeight: 1.5 }}>
          {count === 0
            ? "Looks like the timer ran out before you started. Your next round is where it all starts, give it a go!"
            : count < 30
              ? `You turned ${count} ${count === 1 ? 'circle' : 'circles'} into objects in 3 minutes, well done!`
              : `Whoohoo! You turned all 30 circles into objects in 3 minutes.`}
        </div>

        <div className="end-grid" style={{ marginTop: 18, display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
          {Array.from({ length: count }).map((_, i) => (
            <div key={i} style={{ aspectRatio: '1', position: 'relative' }}>
              {/* colored blob — 126% of cell, centered */}
              <div style={{
                position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                width: '100%', height: '100%',
                background: colors[i % colors.length],
                borderRadius: '50%',
              }}/>
              {/* drawing circle — centered on blob, slightly smaller */}
              <div className="end-drawing-circle" style={{
                position: 'absolute',
                top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                borderRadius: '50%', overflow: 'hidden',
              }}>
                {drawings[i]
                  ? <img src={drawings[i]} style={{ width: '100%', height: '100%', objectFit: 'cover', mixBlendMode: 'multiply' }} alt={`circle ${i + 1}`}/>
                  : <svg width="100%" height="100%" viewBox="0 0 42 42" style={{ position: 'absolute', inset: 0 }}>
                      <circle cx={21} cy={21} r={19} stroke="#1F1F1F" strokeWidth={7} fill="none"/>
                    </svg>
                }
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{
        position: 'fixed', bottom: 'max(20px, calc(20px + env(safe-area-inset-bottom)))', left: 0, right: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, padding: '0 20px',
        zIndex: 10,
        animation: isLeaving ? 'exitDown 0.45s cubic-bezier(0.4,0,1,0.5) 0.07s both' : animIn ? 'drawEnterRight 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.1s both' : 'none',
      }} className="end-buttons">
        {[
          { label: 'Try again', onClick: onRestart, bg: '#fff', color: '#1a1a1a', border: '2px solid #1a1a1a', width: '100%' },
          { label: <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>Share with a friend <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6.25 3C4.45507 3 3 4.45507 3 6.25V17.75C3 19.5449 4.45507 21 6.25 21H17.75C19.5449 21 21 19.5449 21 17.75V6.25C21 4.45507 19.5449 3 17.75 3H6.25ZM4.5 6.25C4.5 5.2835 5.2835 4.5 6.25 4.5H17.75C18.7165 4.5 19.5 5.2835 19.5 6.25V17.75C19.5 18.7165 18.7165 19.5 17.75 19.5H6.25C5.2835 19.5 4.5 18.7165 4.5 17.75V6.25ZM8.75 9.5H13.4905L8.22232 14.7172C7.928 15.0086 7.92569 15.4835 8.21715 15.7778C8.50862 16.0721 8.98349 16.0744 9.2778 15.783L14.5 10.6114V15.25C14.5 15.6642 14.8358 16 15.25 16C15.6642 16 16 15.6642 16 15.25V8.75C16 8.33579 15.6642 8 15.25 8H8.75C8.33579 8 8 8.33579 8 8.75C8 9.16421 8.33579 9.5 8.75 9.5Z" fill="currentColor"/></svg></span>, onClick: handleShare, bg: '#1a1a1a', color: '#fef48a', border: 'none', width: '100%', hidden: count === 0 || !canNativeShare },
          { label: <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>Download as an image <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18.2498 20.5009C18.664 20.5008 19 20.8365 19 21.2507C19 21.6649 18.6644 22.0008 18.2502 22.0009L5.25022 22.0047C4.836 22.0048 4.5 21.6691 4.5 21.2549C4.5 20.8407 4.83557 20.5048 5.24978 20.5047L18.2498 20.5009ZM11.6482 2.01271L11.75 2.00586C12.1297 2.00586 12.4435 2.28801 12.4932 2.65409L12.5 2.75586L12.499 16.4409L16.2208 12.7205C16.4871 12.4543 16.9038 12.4301 17.1974 12.648L17.2815 12.7206C17.5477 12.9869 17.5719 13.4036 17.354 13.6972L17.2814 13.7813L12.2837 18.7779C12.0176 19.044 11.6012 19.0683 11.3076 18.8507L11.2235 18.7782L6.22003 13.7816C5.92694 13.4889 5.92661 13.014 6.21931 12.7209C6.48539 12.4545 6.90204 12.43 7.1958 12.6477L7.27997 12.7202L10.999 16.4339L11 2.75586C11 2.37616 11.2822 2.06237 11.6482 2.01271Z" fill="currentColor"/></svg></span>, onClick: handleDownload, bg: '#1a1a1a', color: '#fef48a', border: 'none', width: '100%', hidden: count === 0 || canNativeShare },
        ].filter(({ hidden }) => !hidden).map(({ label, onClick, bg, color, border, width }) => (
          <button key={label} onClick={onClick} style={{
            width, background: bg, color, border,
            cursor: 'pointer', padding: '14px 0', borderRadius: 999,
            fontFamily: 'Caveat', fontSize: 22, fontWeight: 700,
            boxShadow: '0 4px 14px rgba(0,0,0,0.1)',
            transition: 'transform 0.1s',
          }}
            onPointerDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
            onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
          >{label}</button>
        ))}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('intro');
  const [isStarting, setIsStarting] = useState(false);
  const [isFinishing, setIsFinishing] = useState(false);
  const [isRestarting, setIsRestarting] = useState(false);
  const [introEnterFromTop, setIntroEnterFromTop] = useState(true);
  const [circleIdx, setCircleIdx] = useState(1);
  const [timeLeft, setTimeLeft] = useState(TOTAL_SECS);
  const [running, setRunning] = useState(false);
  const [tool, setTool] = useState('pen');
  const [canvasKey, setCanvasKey] = useState(0);
  const [drawings, setDrawings] = useState([]);
  const undoRef = useRef(null);
  const redoRef = useRef(null);
  const captureRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    if (timeLeft <= 0) {
      setRunning(false);
      const dataUrl = captureRef.current?.();
      if (dataUrl) setDrawings(d => [...d, dataUrl]);
      window.umami?.track('game_finished', { circles: circleIdx, reason: 'timer' });
      haptic([100, 50, 100, 50, 200]);
      setIsFinishing(true);
      setTimeout(() => { setScreen('done'); setIsFinishing(false); }, 600);
      return;
    }
    const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(id);
  }, [running, timeLeft]);

  const handleStart = () => {
    window.umami?.track('game_started');
    setIsStarting(true);
    setTimeout(() => {
      setScreen('drawing');
      setRunning(true);
      setIsStarting(false);
    }, 750);
  };

  const handleDone = () => {
    haptic([40]);
    window.umami?.track('circle_drawn', { circle: circleIdx });
    const dataUrl = captureRef.current?.();
    setDrawings(d => dataUrl ? [...d, dataUrl] : d);
    if (circleIdx >= TOTAL) {
      setRunning(false);
      window.umami?.track('game_finished', { circles: TOTAL, reason: 'completed' });
      setIsFinishing(true);
      setTimeout(() => { setScreen('done'); setIsFinishing(false); }, 600);
      return;
    }
    setCircleIdx(i => i + 1);
    setCanvasKey(k => k + 1);
    setTool('pen');
  };

  const handleRestart = () => {
    window.umami?.track('game_restarted');
    setIsRestarting(true);
    setTimeout(() => {
      setScreen('intro');
      setIntroEnterFromTop(true);
      setIsRestarting(false);
      setCircleIdx(1);
      setTimeLeft(TOTAL_SECS);
      setRunning(false);
      setTool('pen');
      setCanvasKey(k => k + 1);
      setDrawings([]);
    }, 600);
  };

  if (screen === 'intro') return <IntroScreen onStart={handleStart} isLeaving={isStarting} enterFromTop={introEnterFromTop}/>;
  if (screen === 'drawing') return (
    <DrawingScreen
      circleIdx={circleIdx}
      timeLeft={timeLeft}
      tool={tool}
      setTool={setTool}
      onDone={handleDone}
      canvasKey={canvasKey}
      undoRef={undoRef}
      redoRef={redoRef}
      captureRef={captureRef}
      isLeaving={isFinishing}
    />
  );
  return (
    <EndScreen
      count={drawings.length}
      timeLeft={timeLeft}
      drawings={drawings}
      onRestart={handleRestart}
      isLeaving={isRestarting}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
